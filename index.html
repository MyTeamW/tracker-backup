<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>股票追踪</title>
    <link rel="stylesheet" href="./styles.css?v=20260507-export1" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="股票追踪">
        <div>
          <p class="eyebrow">China A-Share Tracker</p>
          <h1>股票追踪</h1>
        </div>
        <div class="meta">
          <span id="clockText">--</span>
          <span id="updateStatus">正在载入数据</span>
          <button id="refreshButton" class="icon-button" type="button" title="刷新行情">
            <span aria-hidden="true">↻</span>
            <span class="sr-only">刷新行情</span>
          </button>
        </div>
      </section>

      <section class="controls" aria-label="股票操作">
        <form id="stockForm" class="stock-form">
          <label>
            <span>股票代码</span>
            <textarea id="codeInput" name="code" inputmode="numeric" autocomplete="off" placeholder="002716, 300058, 002131"></textarea>
          </label>
          <label>
            <span>股票名称</span>
            <input id="nameInput" name="name" autocomplete="off" placeholder="湖南白银" />
          </label>
          <label>
            <span>起始日期</span>
            <input id="startDateInput" name="startDate" type="date" title="不填则使用添加日期" />
          </label>
          <label>
            <span>起始价</span>
            <input id="startPriceInput" name="startPrice" type="number" min="0" step="0.01" placeholder="自动" />
          </label>
          <button class="primary" type="submit">添加</button>
        </form>

        <div class="search-row">
          <label>
            <span>查询</span>
            <input id="searchInput" autocomplete="off" placeholder="名称或代码" />
          </label>
          <label>
            <span>添加历史</span>
            <select id="historySelect">
              <option value="">选择历史股票</option>
            </select>
          </label>
          <label>
            <span>垃圾桶</span>
            <select id="trashSelect">
              <option value="">选择已删除股票</option>
            </select>
          </label>
          <button id="restoreOrderButton" class="secondary restore-order" type="button">我的排序！</button>
          <button id="batchExportButton" class="secondary batch-export" type="button">批量导出</button>
          <div id="exportActions" class="export-actions" hidden>
            <select id="exportFormatSelect" title="导出格式">
              <option value="txt">文本</option>
              <option value="xls">Excel表格</option>
            </select>
            <button id="exportButton" class="primary" type="button">导出</button>
            <button id="cancelExportButton" class="secondary" type="button">取消</button>
          </div>
        </div>
      </section>

      <section class="table-wrap" aria-label="股票列表">
        <table>
          <thead>
            <tr>
              <th id="indexHeader">
                <button id="indexSortButton" class="sort-button" type="button" data-sort="index">序号</button>
                <label id="selectAllWrap" class="select-all" hidden>
                  <input id="selectAllInput" type="checkbox" />
                  <span>全选</span>
                </label>
              </th>
              <th>股票</th>
              <th>备注</th>
              <th><button class="sort-button" type="button" data-sort="startDate">起始日期</button></th>
              <th><button class="sort-button" type="button" data-sort="startPrice">添加起始日价</button></th>
              <th><button class="sort-button" type="button" data-sort="highPrice">起始日起最高价</button></th>
              <th><button class="sort-button" type="button" data-sort="closePrice">今日收盘价</button></th>
              <th><button class="sort-button" type="button" data-sort="increase">涨幅</button></th>
              <th><button class="sort-button" type="button" data-sort="highDrawdown">最高价回撤</button></th>
              <th><button class="sort-button" type="button" data-sort="startDrawdown">起始价回撤</button></th>
              <th>推荐人</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="stockRows"></tbody>
        </table>
        <div id="emptyState" class="empty" hidden>暂无匹配股票</div>
      </section>
    </main>

    <template id="rowTemplate">
      <tr>
        <td data-key="index"></td>
        <td data-key="identity"></td>
        <td>
          <textarea class="remark-input" data-key="remark" rows="2" title="编辑备注"></textarea>
        </td>
        <td>
          <input class="row-date" data-key="startDate" type="date" title="修改起始日期" />
        </td>
        <td data-key="startPrice"></td>
        <td data-key="highPrice"></td>
        <td data-key="closePrice"></td>
        <td data-key="increase"></td>
        <td data-key="highDrawdown"></td>
        <td data-key="startDrawdown"></td>
        <td>
          <input class="recommender-input" data-key="recommender" autocomplete="off" title="编辑推荐人" />
        </td>
        <td>
          <button class="delete" type="button" title="删除">删除</button>
        </td>
      </tr>
    </template>

    <script src="./app.js?v=20260507-export1"></script>
  </body>
</html>
