name: Update market data

on:
  schedule:
    # Beijing time: 15:25, 15:55, 16:25, 16:55, 17:25, 18:25 on trading weekdays.
    - cron: "25 7 * * 1-5"
    - cron: "55 7 * * 1-5"
    - cron: "25 8 * * 1-5"
    - cron: "55 8 * * 1-5"
    - cron: "25 9 * * 1-5"
    - cron: "25 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update market JSON
        run: python scripts/update_market.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update market data"
          file_pattern: data/market.json

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
